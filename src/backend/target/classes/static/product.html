<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Product Detail</h1>
    <div id="alert-container"></div>
    <div class="card">
        <div id="product-container">
            <p class="loading">Loading product...</p>
        </div>
    </div>
    <a href="admin.html" style="margin-top: 1rem; display: inline-block;">← Back to Admin</a>

    <script src="api.js"></script>
    <script>
        function showAlert(message, type = "success") {
            const container = document.getElementById("alert-container");
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = "";
            }, 3000);
        }

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get("id");
            if (!productId) {
                showAlert("Product ID is missing!", "error");
                return;
            }
            try {
                const result = await getProductById(productId);
                const product = result.data;
                renderProduct(product);
            } catch (error) {
                showAlert(error.message, "error");
            }
        }

        function renderProduct(product) {
            const container = document.getElementById("product-container");
            let html = "<h2>" + product.productName + "</h2>";
            html += "<p><strong>Status:</strong> " + product.status + "</p>";
            html += "<p><strong>Category ID:</strong> " + product.categoryId + "</p>";
            if (product.description) {
                html += "<p><strong>Description:</strong> " + product.description + "</p>";
            }
            html += "<p><strong>Starting Price:</strong> " + product.startingPrice + "</p>";
            container.innerHTML = html;
        }

        loadProduct();
    </script>
</body>
</html>
