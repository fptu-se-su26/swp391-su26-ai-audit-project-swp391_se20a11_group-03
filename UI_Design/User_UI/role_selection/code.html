<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Role Selection | LuxeAuction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

                    "secondary-container": "#fed488",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e4e2e4",
                    "on-primary-fixed-variant": "#39475f",
                    "tertiary-container": "#002116",
                    "surface-tint": "#515f78",
                    "secondary": "#775a19",
                    "on-surface-variant": "#44474d",
                    "on-background": "#1b1b1d",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#261900",
                    "secondary-fixed-dim": "#e9c176",
                    "surface-container-highest": "#e4e2e4",
                    "primary-container": "#0d1c32",
                    "outline": "#75777e",
                    "on-primary-fixed": "#0d1c32",
                    "tertiary-fixed": "#a6f2d1",
                    "primary": "#000000",
                    "inverse-primary": "#b9c7e4",
                    "surface-container-low": "#f5f3f5",
                    "surface-bright": "#fbf9fb",
                    "outline-variant": "#c5c6cd",
                    "secondary-fixed": "#ffdea5",
                    "on-primary": "#ffffff",
                    "surface-dim": "#dbd9db",
                    "error": "#ba1a1a",
                    "on-secondary-fixed-variant": "#5d4201",
                    "background": "#fbf9fb",
                    "inverse-on-surface": "#f2f0f2",
                    "on-tertiary-fixed": "#002116",
                    "surface-container": "#efedef",
                    "tertiary-fixed-dim": "#8bd6b6",
                    "on-secondary-container": "#785a1a",
                    "on-tertiary-fixed-variant": "#00513b",
                    "inverse-surface": "#303032",
                    "primary-fixed-dim": "#b9c7e4",
                    "on-tertiary-container": "#479175",
                    "on-primary-container": "#76849f",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "spacing": {
                    "xl": "80px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "xs": "4px",
                    "md": "24px",
                    "sm": "12px",

                    "margin-desktop": "64px",
                    "lg": "48px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "display-lg-mobile": ["Montserrat"],

<style>
        body {
            background-color: #0a192f; /* Direct override for deep dark navy background as requested */
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #e9c176; /* secondary-fixed-dim gold */
            box-shadow: 0 0 30px rgba(233, 193, 118, 0.15);
            transform: translateY(-8px);
        }

        .card-selected {
            background: rgba(233, 193, 118, 0.05) !important;
            border-color: #ffdea5 !important; /* secondary-fixed gold */
            box-shadow: 0 0 40px rgba(233, 193, 118, 0.25) !important;
            transform: scale(1.02);
        }

        .btn-premium {
            background: #ffdea5; /* secondary-fixed gold */
            color: #0d1c32; /* primary-container navy */
            transition: all 0.3s ease;
        }

        .btn-premium:disabled {
            background: #44474d;
            color: #75777e;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-premium:not(:disabled):hover {
            background: #fed488;
            box-shadow: 0 0 20px rgba(255, 222, 165, 0.4);
            transform: scale(1.02);
        }

        .floating-accent {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(233, 193, 118, 0.05) 0%, rgba(10, 25, 47, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Atmospheric Background Accents -->
<div class="floating-accent top-[-100px] left-[-100px]"></div>
<div class="floating-accent bottom-[-100px] right-[-100px]"></div>
<!-- Header: LuxeAuction Logo -->
<header class="w-full flex justify-center pt-12 pb-8">
<h1 class="font-headline-md text-headline-md font-extrabold tracking-tighter text-secondary-fixed">
            LuxeAuction
        </h1>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-lg text-center">
<!-- Typography Section -->
<div class="max-w-3xl mb-xl">
<h2 class="font-display-lg text-display-lg-mobile md:text-display-lg text-white mb-sm">
                Welcome to LuxeAuction! How would you like to participate?
            </h2>
<p class="font-headline-sm text-headline-sm text-on-primary-container opacity-80 max-w-2xl mx-auto">
                Select your primary goal. You can always change or upgrade your account type later.
            </p>
</div>
<!-- Role Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-5xl mb-xl">
<!-- Collector Card -->
<button class="glass-card group flex flex-col items-center p-lg rounded-xl text-center focus:outline-none" id="role-collector" onclick="selectRole('collector')">
<div class="w-20 h-20 rounded-full bg-primary-container flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-secondary-fixed text-[40px]" data-icon="gavel">gavel</span>
</div>
<h3 class="font-headline-md text-headline-md text-white mb-base">I am a Collector</h3>
<p class="font-body-md text-body-md text-on-primary-container opacity-70">
                    Bid on exclusive luxury items, track live auctions, and build your portfolio.
                </p>
<div class="mt-md opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-label-md text-label-md text-secondary-fixed uppercase tracking-widest">Select Account</span>
</div>
</button>
<!-- Seller Card -->
<button class="glass-card group flex flex-col items-center p-lg rounded-xl text-center focus:outline-none" id="role-seller" onclick="selectRole('seller')">
<div class="w-20 h-20 rounded-full bg-primary-container flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-secondary-fixed text-[40px]" data-icon="storefront">storefront</span>
</div>
<h3 class="font-headline-md text-headline-md text-white mb-base">I am a Seller</h3>
<p class="font-body-md text-body-md text-on-primary-container opacity-70">
                    Consign your premium assets, reach elite buyers, and use AI to value your items.
                </p>
<div class="mt-md opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-label-md text-label-md text-secondary-fixed uppercase tracking-widest">Select Account</span>
</div>
</button>
</div>
<!-- CTA Action -->
<div class="w-full max-w-md">
<button class="btn-premium w-full py-md px-lg rounded-lg font-headline-sm text-headline-sm shadow-xl flex items-center justify-center gap-base" disabled="" id="continue-btn">
                Continue to Dashboard
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-sm font-label-sm text-label-sm text-on-primary-container opacity-40">
                Secure enterprise-grade encryption for all transactions.
            </p>
</div>
</main>
<!-- Visual Polish: Subtle Background Gradients -->
<div class="fixed inset-0 pointer-events-none opacity-20 z-[-2]">
<div class="absolute inset-0 bg-gradient-to-b from-[#0a192f] via-transparent to-[#0a192f]"></div>
</div>
<script>
        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            
            // UI Feedback
            const collectorCard = document.getElementById('role-collector');
            const sellerCard = document.getElementById('role-seller');
            const continueBtn = document.getElementById('continue-btn');

            if (role === 'collector') {
                collectorCard.classList.add('card-selected');
                sellerCard.classList.remove('card-selected');
            } else {
                sellerCard.classList.add('card-selected');
                collectorCard.classList.remove('card-selected');
            }

            // Enable Button
            continueBtn.disabled = false;
        }

        // Add a click effect to the continue button
        document.getElementById('continue-btn').addEventListener('click', function() {
            if (!this.disabled) {
                this.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Initializing Your Workspace...`;
                setTimeout(() => {
                    // Simulation of redirection
                    this.style.transform = 'scale(0.95)';
                }, 100);
            }
        });
    </script>
</body></html>
