spring.application.name=auction-backend

# SQL Server datasource
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_Nhom3;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Ignore persistence.xml — dùng Spring Boot DataSource thay vì JPA standalone
spring.jpa.properties.jakarta.persistence.jdbc.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_Nhom3;encrypt=true;trustServerCertificate=true

server.port=8096

# JWT
app.jwt.secret=local-development-jwt-secret-key-32chars-minimum
app.jwt.expiration-ms=86400000
app.seed.enabled=true
app.kyc.upload-dir=${user.dir}/data/private/kyc
app.kyc.legacy-upload-dir=${user.dir}/src/main/resources/static/uploads/kyc
app.kyc.max-file-bytes=8388608
app.kyc.max-pixels=24000000
app.upload.dir=${user.dir}/uploads
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=25MB
sepay.bank-id=MB
sepay.bank-account=6819062005
sepay.account-name=LUXEAUCTION
