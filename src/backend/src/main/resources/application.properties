# Database - Supabase PostgreSQL
# Dùng Session Pooler (IPv4) cho môi trường phát triển local.
# Lấy connection string tại: Supabase Dashboard > Project Settings > Database > Connection string
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SUPABASE_DB_USER:postgres.kbkbfkjwhovqobypijrb}
spring.datasource.password=${SUPABASE_DB_PASSWORD:Quynhloc2310}

# Database connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# The DB uses TIMESTAMPTZ columns but the entities map them as naive LocalDateTime.
# Without a fixed jdbc time_zone, writes and reads used different zones and shifted
# every scheduled time by the UTC+7 offset (e.g. 07:35 saved, read back as 00:35).
# Pinning the JDBC zone makes the round-trip symmetric so wall-clock times are stable.
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIME_ZONE:Asia/Ho_Chi_Minh}

# Serialize/deserialize JSON timestamps in the same zone the app treats as "now".
spring.jackson.time-zone=${APP_TIME_ZONE:Asia/Ho_Chi_Minh}

# JWT
app.jwt.secret=${APP_JWT_SECRET:local-development-jwt-secret-key-32chars-minimum}
app.jwt.expiration-ms=86400000

