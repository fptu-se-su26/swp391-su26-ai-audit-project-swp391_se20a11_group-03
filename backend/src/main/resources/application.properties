spring.application.name=auction-backend
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_Nhom3_App;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
server.port=8096
app.jwt.secret=local-development-jwt-secret-key-32chars-minimum
app.jwt.expiration-ms=86400000
# Google OAuth client id used to verify "Sign in with Google" credentials.
# Leave blank in local dev to skip the audience check; set in prod.
app.google.client-id=${GOOGLE_CLIENT_ID:875351769621-msohqgodeum8d07j56n9hiv76c161d3e.apps.googleusercontent.com}
# Demo seed on startup resets test wallets to 50M — disable for DB-only mode.
# To re-enable locally: add app.seed.enabled=true to application-local.properties (gitignored).
app.seed.enabled=false
app.kyc.upload-dir=${user.dir}/src/main/resources/static/uploads/kyc
app.kyc.public-prefix=/uploads/kyc
app.upload.dir=${user.dir}/uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
# Google Gemini — separate keys recommended: OCR (CCCD) vs AI valuation
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
gemini.ocr.api.key=${GEMINI_OCR_API_KEY:${gemini.api.key:}}
gemini.valuation.api.key=${GEMINI_VALUATION_API_KEY:${gemini.api.key:}}
# Comma-separated key pools (round-robin + 429 failover); fallback to single-key props above
gemini.ocr.api.keys=${GEMINI_OCR_API_KEYS:}
gemini.valuation.api.keys=${GEMINI_VALUATION_API_KEYS:}
gemini.api.base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.api.model=${GEMINI_API_MODEL:gemini-flash-lite-latest}
sepay.bank-account=6819062005
sepay.account-name=LUXEAUCTION
