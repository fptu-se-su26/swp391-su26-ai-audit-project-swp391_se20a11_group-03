spring.application.name=backend

# =============================================
# SQL SERVER - DATABASE CONNECTION
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_Nhom3;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234567
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA / HIBERNATE
# =============================================
# create: drop & recreate tables on startup (dùng lần đầu hoặc khi đổi schema)
# update: chỉ thêm/sửa, không xóa (dùng sau khi schema ổn định)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# JWT
# =============================================
app.jwt.secret=SWP391BiddingSystemSecretKey2026VeryLongAndSecureEnoughForHS256Algorithm!
app.jwt.expiration-ms=86400000

# =============================================
# SCHEDULING (Auction status updater)
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# ERROR / DIAGNOSTICS (dev only)
# =============================================
server.error.include-stacktrace=always
server.error.include-message=always
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
logging.level.org.springframework.web.servlet.handler=DEBUG
