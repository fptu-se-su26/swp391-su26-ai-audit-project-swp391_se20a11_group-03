spring.application.name=backend

# =============================================
# SQL SERVER - DATABASE CONNECTION
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_Nhom3;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234567
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA / HIBERNATE
# =============================================
# create: drop & recreate tables on startup (dùng lần đầu hoặc khi đổi schema)
# update: chỉ thêm/sửa, không xóa (dùng sau khi schema ổn định)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# JWT
# =============================================
app.jwt.secret=SWP391BiddingSystemSecretKey2026VeryLongAndSecureEnoughForHS256Algorithm!
app.jwt.expiration-ms=86400000

# =============================================
# SCHEDULING (Auction status updater)
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# GROQ AI (Chatbot hỗ trợ định giá sản phẩm)
# Đặt API key qua biến môi trường: GROQ_API_KEY
# Lấy key miễn phí tại https://console.groq.com/keys
# =============================================
groq.api.key=${GROQ_API_KEY}
groq.api.base-url=https://api.groq.com/openai/v1
groq.api.model=qwen/qwen3-32b
groq.api.temperature=0.4
groq.api.max-tokens=1024
# Với model suy luận (qwen3, gpt-oss...): ẩn phần "suy nghĩ", chỉ trả câu trả lời cuối.
# Để trống nếu model không hỗ trợ reasoning.
groq.api.reasoning-format=hidden

# =============================================
# ERROR / DIAGNOSTICS (dev only)
# =============================================
server.error.include-stacktrace=always
server.error.include-message=always
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
logging.level.org.springframework.web.servlet.handler=DEBUG
