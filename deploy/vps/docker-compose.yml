services:
  backend:
    build:
      context: ../../src/backend
    container_name: bidzone-backend
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      PORT: "8096"
      APP_UPLOAD_DIR: /app/uploads
      APP_KYC_UPLOAD_DIR: /app/uploads/kyc
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - bidzone_uploads:/app/uploads

volumes:
  bidzone_uploads:
