<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Product Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Admin Dashboard</h1>

    <div id="alert-container"></div>

    <!-- Product Approval Section -->
    <h2>Pending Products</h2>
    <div class="card">
        <div id="pending-products-container">
            <p class="loading">Loading products...</p>
        </div>
    </div>

    <!-- Contracts Section -->
    <h2>Contracts</h2>
    <div class="card">
        <div id="contracts-container">
            <p class="loading">Loading contracts...</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let pendingProducts = [];
        let contracts = [];

        // Helper to show alerts
        function showAlert(message, type = "success") {
            const container = document.getElementById("alert-container");
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = "";
            }, 3000);
        }

        // Load and render pending products
        async function loadPendingProducts() {
            const container = document.getElementById("pending-products-container");
            container.innerHTML = `<p class="loading">Loading products...</p>`;
            try {
                const result = await getPendingProducts();
                pendingProducts = result.data;
                renderPendingProducts();
            } catch (error) {
                showAlert(error.message, "error");
                container.innerHTML = `<p class="alert-error">Failed to load products</p>`;
            }
        }

        function renderPendingProducts() {
            const container = document.getElementById("pending-products-container");
            if (!pendingProducts.length) {
                container.innerHTML = "<p>No pending products found</p>";
                return;
            }

            let html = "<table><thead><tr><th>Product Name</th><th>Category ID</th><th>Status</th><th>Actions</th></tr></thead><tbody>";
            pendingProducts.forEach(product => {
                html += `<tr><td><a href="product.html?id=${product.productId}" target="_blank">${product.productName}</a></td><td>${product.categoryId}</td><td>${product.status}</td><td class="product-actions"><button class="btn-success btn-sm" onclick="approveProductHandler(${product.productId})">Approve</button><button class="btn-danger btn-sm" onclick="showRejectModal(${product.productId})">Reject</button></td></tr>`;
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        }

        async function approveProductHandler(productId) {
            try {
                await approveProduct(productId, null);
                showAlert("Product approved successfully!");
                loadPendingProducts();
                loadContracts();
            } catch (error) {
                showAlert(error.message, "error");
            }
        }

        function showRejectModal(productId) {
            const reason = prompt("Enter reason for rejection:");
            if (reason === null) return;
            rejectProductHandler(productId, reason);
        }

        async function rejectProductHandler(productId, reason) {
            try {
                await rejectProduct(productId, reason);
                showAlert("Product rejected successfully!");
                loadPendingProducts();
            } catch (error) {
                showAlert(error.message, "error");
            }
        }

        // Load and render contracts
        async function loadContracts() {
            const container = document.getElementById("contracts-container");
            container.innerHTML = `<p class="loading">Loading contracts...</p>`;
            try {
                const result = await getContracts();
                contracts = result.data;
                renderContracts();
            } catch (error) {
                showAlert(error.message, "error");
                container.innerHTML = `<p class="alert-error">Failed to load contracts</p>`;
            }
        }

        function renderContracts() {
            const container = document.getElementById("contracts-container");
            if (!contracts.length) {
                container.innerHTML = "<p>No contracts found</p>";
                return;
            }

            let html = "<table><thead><tr><th>Contract Type</th><th>Reference ID</th><th>Status</th><th>File URL</th><th>Created At</th></tr></thead><tbody>";
            contracts.forEach(contract => {
                html += `<tr><td>${contract.contractType}</td><td>${contract.referenceId}</td><td>${contract.status}</td><td><a href="${contract.fileUrl}" target="_blank">${contract.fileUrl}</a></td><td>${new Date(contract.createdAt).toLocaleString()}</td></tr>`;
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        }

        // Initialize
        loadPendingProducts();
        loadContracts();
    </script>
</body>
</html>
